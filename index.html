<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relevamiento FTTH - CABA AF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ⚠️ PEGAR AQUÍ TU CONFIGURACIÓN DE FIREBASE ⚠️
        const firebaseConfig = {
        apiKey: "AIzaSyC1yyZ2N3t8nbtgECkshjl4MBgnjOtJj7M",
        authDomain: "relevos-9645a.firebaseapp.com",
        projectId: "relevos-9645a",
        storageBucket: "relevos-9645a.firebasestorage.app",
        messagingSenderId: "816456413666",
        appId: "1:816456413666:web:b0202740d9cb40a6f309bb",
        measurementId: "G-XXC9KMQZB2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const GAS_URL = "https://script.google.com/macros/s/AKfycbw6x0HZIsnlqKOpiKS2813hRKWRBMGELrjDrL99EqCn-Ayq_AIz4SdvLMcTVFbw_2vr6w/exec";

        let maestroDatos = [];
        let usuarioActual = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                usuarioActual = user;
                document.getElementById('login-screen').classList.add('hidden');
                
                const userRef = doc(db, "usuarios", user.email);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists()) {
                    const rol = userSnap.data().rol;
                    if (rol === "autorizado" || rol === "superadmin") {
                        document.getElementById('app-screen').classList.remove('hidden');
                        document.getElementById('warning-screen').classList.add('hidden');
                        cargarDatosJSON(); 
                    } else {
                        document.getElementById('warning-screen').classList.remove('hidden');
                    }
                } else {
                    await setDoc(userRef, { rol: "nuevo", email: user.email });
                    document.getElementById('warning-screen').classList.remove('hidden');
                }
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('warning-screen').classList.add('hidden');
            }
        });

        document.getElementById('btn-login').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        async function cargarDatosJSON() {
            try {
                // Agregar timestamp a la URL evita que el celular guarde en caché un JSON viejo
                const response = await fetch('./Maestro_Edificios_CABA_App.json?t=' + new Date().getTime());
                maestroDatos = await response.json();
                renderTarjetas(maestroDatos.slice(0, 50)); // Render inicial de muestra
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('cards-container').innerHTML = '<p class="text-red-500">Error al cargar datos.</p>';
            }
        }

        async function renderTarjetas(datosFiltrados) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            for (const edif of datosFiltrados) {
                const relevoRef = doc(db, "relevamientos", edif.ACTIVO);
                const relevoSnap = await getDoc(relevoRef);
                const estaRelevado = relevoSnap.exists();
                const datosRelevo = estaRelevado ? relevoSnap.data() : null;

                const card = document.createElement('div');
                card.className = `p-4 border rounded-lg shadow-sm mb-4 ${estaRelevado ? 'bg-green-50 border-green-400' : 'bg-white'}`;
                
                let htmlSecundarias = edif.DIRECCIONES_SECUNDARIAS.length > 0 
                    ? `<p class="text-xs text-gray-500 mb-2">Secundarias: ${edif.DIRECCIONES_SECUNDARIAS.map(s => s.CALLE + ' ' + s.ALTURA).join(' | ')}</p>` 
                    : '';

                if (estaRelevado) {
                    card.innerHTML = `
                        <div class="flex justify-between"><span class="text-xs font-bold text-gray-500">${edif.ACTIVO} | ${edif.PD}</span></div>
                        <h3 class="text-lg font-bold">${edif.CALLE} ${edif.ALTURA}</h3>
                        <p class="text-green-700 font-bold my-2">✅ Relevado: ${datosRelevo.accion} (${datosRelevo.fecha})</p>
                        <button onclick="deshacerRelevo('${edif.ACTIVO}')" class="text-sm text-red-600 underline">Deshacer/Editar</button>
                    `;
                } else {
                    const esConstruido = edif.ESTADO_CONSTRUCTIVO_EDIFICIO === "CONSTRUIDO";
                    card.innerHTML = `
                        <div class="flex justify-between">
                            <span class="text-xs font-bold text-gray-500">${edif.ACTIVO} | ${edif.PD}</span>
                            <span class="text-xs bg-gray-200 px-2 rounded">${edif.ESTADO_CONSTRUCTIVO_EDIFICIO}</span>
                        </div>
                        <h3 class="text-lg font-bold mt-1">${edif.CALLE} ${edif.ALTURA}</h3>
                        <p class="text-sm text-gray-600 mb-1">${edif.CIUDAD}, ${edif.PARTIDO}</p>
                        ${htmlSecundarias}
                        <select id="accion-${edif.ACTIVO}" class="w-full p-2 border rounded mb-2 text-sm">
                            <option value="">Seleccione Acción...</option>
                            <option value="CORREGIR ALTURA">Corregir Altura</option>
                            <option value="UNIFICAR DIRECCIONES">Unificar Direcciones</option>
                            <option value="NO ESTA CONSTRUIDO">No está construido / Obra</option>
                            ${!esConstruido ? `
                                <option value="INFORMAR CONSTRUIDO">Informar Construido</option>
                                <option value="NO ES EDIFICIO">No es Edificio</option>
                                <option value="IMPOSIBLE CONSTRUIR">Imposible Construir</option>
                                <option value="COMPETENCIA">Competencia</option>
                            ` : ''}
                        </select>
                        <input type="text" id="obs-${edif.ACTIVO}" placeholder="Observación obligatoria" class="w-full p-2 border rounded mb-2 text-sm">
                        <input type="file" id="fotos-${edif.ACTIVO}" multiple accept="image/*" class="w-full text-sm mb-2">
                        <button onclick="enviarRelevo('${edif.ACTIVO}')" class="w-full bg-blue-600 text-white p-2 rounded font-bold hover:bg-blue-700">Enviar Relevamiento</button>
                    `;
                }
                container.appendChild(card);
            }
        }

        window.enviarRelevo = async (activo) => {
            const accion = document.getElementById(`accion-${activo}`).value;
            const obs = document.getElementById(`obs-${activo}`).value;
            const inputFotos = document.getElementById(`fotos-${activo}`);
            
            if (!accion || !obs) { alert("Acción y observación obligatorias."); return; }
            if (inputFotos.files.length > 8) { alert("Máximo 8 fotos permitidas."); return; }

            const btn = event.target;
            btn.innerText = "Procesando..."; btn.disabled = true;

            try {
                let fotosB64 = [];
                for (let i = 0; i < inputFotos.files.length; i++) {
                    fotosB64.push(await comprimirImagen(inputFotos.files[i]));
                }

                const payload = {
                    fecha: new Date().toLocaleString("es-AR"), tecnico: usuarioActual.email,
                    activo: activo, accion: accion, observacion: obs, fotos: fotosB64
                };

                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                
                if(result.status === "success") {
                    await setDoc(doc(db, "relevamientos", activo), {
                        fecha: payload.fecha, tecnico: payload.tecnico, accion: payload.accion, observacion: payload.observacion
                    });
                    cargarDatosJSON(); // Recarga visual
                } else {
                    alert("Error servidor: " + result.message);
                    btn.innerText = "Enviar Relevamiento"; btn.disabled = false;
                }
            } catch (error) {
                alert("Error de conexión al enviar.");
                btn.innerText = "Enviar Relevamiento"; btn.disabled = false;
            }
        };

        window.deshacerRelevo = async (activo) => {
            if(confirm("¿Deseas editar este relevamiento? Se borrará el estado actual.")) {
                await deleteDoc(doc(db, "relevamientos", activo));
                cargarDatosJSON();
            }
        };

        function comprimirImagen(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = 800 / img.width;
                        canvas.width = 800; canvas.height = img.height * scaleSize;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
            });
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">
    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded text-center shadow">
            <h1 class="text-2xl font-bold mb-4 text-blue-600">App Inspectores CABA</h1>
            <button id="btn-login" class="bg-blue-600 text-white px-4 py-2 rounded">Iniciar sesión con Google</button>
        </div>
    </div>
    <div id="warning-screen" class="hidden flex items-center justify-center min-h-screen">
        <div class="bg-yellow-50 p-8 text-center shadow border-yellow-200">
            <h2 class="text-xl font-bold">Acceso Pendiente</h2>
            <p>Solicita autorización al Superadmin.</p>
        </div>
    </div>
    <div id="app-screen" class="hidden max-w-md mx-auto bg-gray-100 min-h-screen">
        <div class="bg-blue-600 text-white p-4 sticky top-0 flex justify-between">
            <h1 class="font-bold">Relevamientos</h1>
            <button id="btn-logout" class="text-sm bg-blue-800 px-2 py-1 rounded">Salir</button>
        </div>
        <div id="cards-container" class="p-4 pb-20"></div>
    </div>
</body>
</html>
